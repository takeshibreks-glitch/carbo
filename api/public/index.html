<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖質チェッカー｜糖化クマ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400&display=swap');
  :root {
    --bg:#ffffff; --bg2:#f7f7f7; --bg3:#efefef;
    --text:#111; --text2:#555; --text3:#999;
    --border:#e8e8e8;
    --line:#06C755; --line-dk:#05b34c;
    --r1:#22a06b; --r2:#5aaa5a; --r3:#e6a817; --r4:#e07020; --r5:#d93025;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);z-index:10;}
  .hdot{width:8px;height:8px;background:#111;border-radius:50%;}
  .htitle{font-size:13px;font-weight:400;letter-spacing:.02em;}
  .hbadge{margin-left:auto;font-size:10px;color:var(--text3);border:1px solid var(--border);border-radius:20px;padding:2px 8px;letter-spacing:.05em;}
  .main{max-width:440px;margin:0 auto;padding:32px 20px 60px;}
  .slabel{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
  .upload-wrap{margin-bottom:28px;}
  .upload-area{border:1.5px dashed var(--border);border-radius:12px;background:var(--bg2);padding:44px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
  .upload-area:hover,.upload-area.drag{border-color:#bbb;background:var(--bg3);}
  .upload-area input{display:none;}
  .uicon{font-size:30px;margin-bottom:10px;display:block;}
  .umain{font-size:14px;font-weight:500;margin-bottom:3px;}
  .usub{font-size:12px;color:var(--text3);}
  .uprev{width:100%;border-radius:10px;object-fit:cover;max-height:280px;display:none;}
  .err{display:none;background:#fff5f5;border:1px solid #fcd4d4;border-radius:8px;padding:12px 14px;font-size:12px;color:#c0392b;margin-bottom:16px;line-height:1.5;}
  .abtn{width:100%;background:#111;color:#fff;border:none;border-radius:10px;padding:15px;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:opacity .15s,transform .15s;margin-bottom:28px;}
  .abtn:hover:not(:disabled){opacity:.8;transform:translateY(-1px);}
  .abtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
  .loading{display:none;padding:40px 0;text-align:center;}
  .ldots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
  .ldots span{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
  .ldots span:nth-child(2){animation-delay:.2s;}
  .ldots span:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
  .ltext{font-size:13px;color:var(--text3);}
  .results{display:none;}
  .divider{height:1px;background:var(--border);margin:24px 0;}
  .spike-block{margin-bottom:4px;}
  .spike-row{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;}
  .snum{font-family:'DM Mono',monospace;font-size:64px;line-height:1;font-weight:400;}
  .sright{display:flex;flex-direction:column;gap:3px;}
  .stext{font-size:16px;font-weight:500;}
  .stiming{font-size:12px;color:var(--text3);}
  .rbar{height:4px;border-radius:2px;background:var(--bg3);position:relative;margin-top:14px;margin-bottom:6px;}
  .rfill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.34,1.2,.64,1);}
  .rlabels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);}
  .btitle{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
  .food-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
  .fname{flex:1;font-size:13px;}
  .fcarb{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}
  .total-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;}
  .tlabel{font-size:12px;font-weight:500;color:var(--text2);}
  .tval{font-family:'DM Mono',monospace;font-size:24px;font-weight:400;}
  .tunit{font-size:11px;color:var(--text3);margin-left:2px;}
  .atext{font-size:14px;line-height:1.85;color:var(--text2);}
  .atip{margin-top:12px;background:var(--bg2);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text2);}
  .cta{border:1.5px solid #111;border-radius:14px;padding:26px 22px;margin-bottom:24px;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .cta-ey{font-size:10px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
  .cta-title{font-size:17px;font-weight:500;line-height:1.6;margin-bottom:10px;}
  .cta-body{font-size:13px;line-height:1.85;color:var(--text2);margin-bottom:20px;}
  .cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--line);color:#fff;text-decoration:none;border-radius:8px;padding:14px;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;letter-spacing:.03em;transition:background .15s,transform .15s;border:none;cursor:pointer;}
  .cta-btn:hover{background:var(--line-dk);transform:translateY(-1px);}
  .cfree{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;}
  .retry{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text3);font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:border-color .15s,color .15s;}
  .retry:hover{border-color:#999;color:var(--text2);}
</style>
</head>
<body>
<header class="header">
  <div class="hdot"></div>
  <div class="htitle">糖質チェッカー｜糖化クマ</div>
  <div class="hbadge">BETA</div>
</header>
<main class="main">
  <div class="upload-wrap">
    <div class="slabel">食事の写真</div>
    <div class="upload-area" id="ua" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept="image/*" onchange="handleFile(this)">
      <span class="uicon" id="uicon">📷</span>
      <div class="umain" id="umain">写真を選ぶ</div>
      <div class="usub" id="usub">タップしてカメラロールから選択</div>
      <img id="uprev" class="uprev" alt="">
    </div>
  </div>

  <div class="err" id="err"></div>
  <button class="abtn" id="abtn" onclick="analyze()">分析する</button>

  <div class="loading" id="loading">
    <div class="ldots"><span></span><span></span><span></span></div>
    <div class="ltext">AIが分析しています...</div>
  </div>

  <div class="results" id="results">
    <div class="spike-block">
      <div class="slabel">血糖値スパイクリスク</div>
      <div class="spike-row">
        <div class="snum" id="snum">—</div>
        <div class="sright">
          <div class="stext" id="stext"></div>
          <div class="stiming" id="stiming"></div>
        </div>
      </div>
      <div class="rbar"><div class="rfill" id="rfill" style="width:0%"></div></div>
      <div class="rlabels"><span>低リスク</span><span>高リスク</span></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="btitle">糖質の内訳</div>
      <div id="flist"></div>
      <div class="total-row">
        <span class="tlabel">合計</span>
        <span><span class="tval" id="tval">—</span><span class="tunit">g</span></span>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="btitle">糖化クマからのひとこと</div>
      <div class="atext" id="atext"></div>
      <div class="atip" id="atip"></div>
    </div>
    <div class="divider"></div>
    <div class="cta">
      <div class="cta-ey">Community</div>
      <div class="cta-title">もっと詳しく<br>観察してみませんか。</div>
      <div class="cta-body">血糖値測定クラブは、毎日の食事を記録しながら、仲間と一緒に血糖値の変化を観察するコミュニティです。</div>
      <a id="linebtn" href="LINE_OPENCHAT_URL_HERE" class="cta-btn" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.27 2 11.5c0 2.88 1.37 5.45 3.53 7.22L4.5 22l3.57-1.86C9.24 20.68 10.59 21 12 21c5.52 0 10-4.27 10-9.5S17.52 2 12 2z"/></svg>
        血糖値測定クラブに参加する
      </a>
      <div class="cfree">無料 · 登録不要</div>
    </div>
    <button class="retry" onclick="reset()">別の食事を分析する</button>
  </div>
</main>
<script>
const COLS=['','#22a06b','#5aaa5a','#e6a817','#e07020','#d93025'];
let img=null,mt=null;

function handleFile(input){
  const f=input.files[0]; if(!f)return;
  mt=f.type||'image/jpeg';
  const r=new FileReader();
  r.onload=e=>{
    img=e.target.result.split(',')[1];
    const p=document.getElementById('uprev');
    p.src=e.target.result; p.style.display='block';
    ['uicon','umain','usub'].forEach(id=>document.getElementById(id).style.display='none');
  };
  r.readAsDataURL(f);
}

const ua=document.getElementById('ua');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('drag');});
ua.addEventListener('dragleave',()=>ua.classList.remove('drag'));
ua.addEventListener('drop',e=>{
  e.preventDefault();ua.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))handleFile({files:[f]});
});

async function analyze(){
  const e=document.getElementById('err'); e.style.display='none';
  if(!img)return showErr('食事の写真を選んでください。');
  document.getElementById('abtn').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('results').style.display='none';
  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:img,mediaType:mt})
    });
    if(!res.ok){const d=await res.json();throw new Error(d.error||'Error');}
    render(await res.json());
  }catch(ex){
    showErr('分析に失敗しました: '+ex.message);
    document.getElementById('abtn').disabled=false;
  }finally{
    document.getElementById('loading').style.display='none';
  }
}

function render(r){
  const lv=Math.min(5,Math.max(1,r.spikeLevel));
  const c=COLS[lv];
  document.getElementById('snum').textContent=lv;
  document.getElementById('snum').style.color=c;
  document.getElementById('stext').textContent=r.spikeLevelText||'';
  document.getElementById('stext').style.color=c;
  document.getElementById('stiming').textContent=r.spikeTiming||'';
  setTimeout(()=>{
    const f=document.getElementById('rfill');
    f.style.width=((lv-1)/4*100)+'%';
    f.style.background=c;
  },100);
  document.getElementById('flist').innerHTML=(r.foods||[]).map(f=>
    `<div class="food-row"><span class="fname">${f.name}</span><span class="fcarb">${f.carbs}g</span></div>`
  ).join('');
  document.getElementById('tval').textContent=r.totalCarbs??'—';
  document.getElementById('atext').textContent=r.advice||'';
  document.getElementById('atip').textContent=r.tip||'';
  document.getElementById('results').style.display='block';
  document.getElementById('abtn').disabled=false;
  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth'}),100);
}

function showErr(m){
  const b=document.getElementById('err');b.textContent=m;b.style.display='block';
  document.getElementById('loading').style.display='none';
}

function reset(){
  img=null;mt=null;
  document.getElementById('uprev').style.display='none';
  ['uicon','umain','usub'].forEach(id=>document.getElementById(id).style.display='');
  document.getElementById('fi').value='';
  document.getElementById('results').style.display='none';
  document.getElementById('err').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
完了
